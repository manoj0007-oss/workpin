<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="620" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Workpin — Architecture Overview</text>
  <text x="440" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">Find work. Hire help. Nearby.</text>

  <!-- ============ FRONTEND BOX ============ -->
  <rect x="290" y="76" width="300" height="100" rx="10" fill="#ffffff" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <!-- icon -->
  <rect x="310" y="96" width="32" height="24" rx="3" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <line x1="310" y1="102" x2="342" y2="102" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="314" y="106" width="10" height="3" rx="1" fill="#22d3ee" opacity="0.5"/>
  <rect x="314" y="112" width="16" height="3" rx="1" fill="#22d3ee" opacity="0.5"/>
  <text x="350" y="112" font-size="15" font-weight="700" fill="#0891b2">Frontend (Next.js 16)</text>
  <text x="310" y="138" font-size="11" fill="#64748b">React · TypeScript · Tailwind v4 · shadcn/ui</text>
  <text x="310" y="155" font-size="11" fill="#64748b">App Router · Mobile-first responsive UI</text>

  <!-- Arrow: Frontend → Supabase -->
  <line x1="440" y1="176" x2="440" y2="230" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ SUPABASE BACKEND BOX ============ -->
  <rect x="270" y="236" width="340" height="100" rx="10" fill="#ffffff" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <!-- cloud icon -->
  <path d="M298 274 a10 10 0 0 1 18-4 a8 8 0 0 1 12 7 h2 a6 6 0 0 1 0 12 h-30 a8 8 0 0 1-2-16z" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="340" y="280" font-size="15" font-weight="700" fill="#0891b2">Supabase (BaaS)</text>
  <text x="290" y="302" font-size="11" fill="#64748b">Auth · PostgreSQL · Realtime Subscriptions</text>
  <text x="290" y="318" font-size="11" fill="#64748b">Row Level Security · Database Triggers</text>

  <!-- Arrows: Supabase → bottom row -->
  <!-- left arrow to Database -->
  <line x1="360" y1="336" x2="160" y2="416" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- center arrow to Realtime -->
  <line x1="440" y1="336" x2="440" y2="416" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- right arrow to Auth -->
  <line x1="520" y1="336" x2="720" y2="416" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ DATABASE BOX ============ -->
  <g transform="translate(60, 422)">
    <rect width="200" height="110" rx="10" fill="#ffffff" stroke="#3fcf8e" stroke-width="2" filter="url(#shadow)"/>
    <!-- DB icon -->
    <ellipse cx="30" cy="26" rx="12" ry="6" fill="none" stroke="#3fcf8e" stroke-width="1.5"/>
    <line x1="18" y1="26" x2="18" y2="44" stroke="#3fcf8e" stroke-width="1.5"/>
    <line x1="42" y1="26" x2="42" y2="44" stroke="#3fcf8e" stroke-width="1.5"/>
    <ellipse cx="30" cy="44" rx="12" ry="6" fill="none" stroke="#3fcf8e" stroke-width="1.5"/>
    <text x="50" y="40" font-size="14" font-weight="700" fill="#16a34a">PostgreSQL</text>
    <text x="20" y="68" font-size="10.5" fill="#64748b">profiles · jobs · requests</text>
    <text x="20" y="84" font-size="10.5" fill="#64748b">messages · ratings</text>
    <text x="20" y="100" font-size="10.5" fill="#64748b">Auto-triggers for ratings/rejections</text>
  </g>

  <!-- ============ REALTIME BOX ============ -->
  <g transform="translate(340, 422)">
    <rect width="200" height="110" rx="10" fill="#ffffff" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
    <!-- realtime/chat icon -->
    <rect x="18" y="18" width="24" height="18" rx="4" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <path d="M22 42 L26 36 h-8z" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <rect x="24" y="24" width="10" height="2" rx="1" fill="#22d3ee" opacity="0.5"/>
    <rect x="24" y="28" width="6" height="2" rx="1" fill="#22d3ee" opacity="0.5"/>
    <text x="50" y="34" font-size="14" font-weight="700" fill="#0891b2">Realtime Engine</text>
    <text x="20" y="62" font-size="10.5" fill="#64748b">Live chat messaging</text>
    <text x="20" y="78" font-size="10.5" fill="#64748b">WebSocket subscriptions</text>
    <text x="20" y="94" font-size="10.5" fill="#64748b">Activity status updates</text>
  </g>

  <!-- ============ AUTH BOX ============ -->
  <g transform="translate(620, 422)">
    <rect width="200" height="110" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <!-- lock icon -->
    <rect x="22" y="28" width="18" height="14" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <path d="M26 28 v-5 a5 5 0 0 1 10 0 v5" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="31" cy="35" r="2" fill="#f59e0b"/>
    <text x="48" y="38" font-size="14" font-weight="700" fill="#d97706">Auth Service</text>
    <text x="20" y="64" font-size="10.5" fill="#64748b">Role-based sign-up (Worker/Client)</text>
    <text x="20" y="80" font-size="10.5" fill="#64748b">Session persistence</text>
    <text x="20" y="96" font-size="10.5" fill="#64748b">Middleware route protection</text>
  </g>

  <!-- ============ EXTERNAL SERVICES (side boxes) ============ -->
  <!-- Mapbox -->
  <g transform="translate(10, 136)">
    <rect width="200" height="90" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
    <!-- map pin icon -->
    <circle cx="30" cy="30" r="5" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <path d="M30 35 L30 45" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="30" cy="30" r="2" fill="#6366f1"/>
    <text x="44" y="34" font-size="14" font-weight="700" fill="#4f46e5">Mapbox GL JS</text>
    <text x="20" y="60" font-size="10.5" fill="#64748b">Interactive map interface</text>
    <text x="20" y="76" font-size="10.5" fill="#64748b">Location-based job discovery</text>
  </g>
  <!-- Arrow: Mapbox → Frontend -->
  <line x1="210" y1="176" x2="290" y2="140" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>

  <!-- i18n -->
  <g transform="translate(670, 136)">
    <rect width="200" height="90" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
    <!-- globe icon -->
    <circle cx="30" cy="30" r="10" fill="none" stroke="#a855f7" stroke-width="1.5"/>
    <ellipse cx="30" cy="30" rx="5" ry="10" fill="none" stroke="#a855f7" stroke-width="1"/>
    <line x1="20" y1="30" x2="40" y2="30" stroke="#a855f7" stroke-width="1"/>
    <text x="46" y="34" font-size="14" font-weight="700" fill="#9333ea">i18n (4 Languages)</text>
    <text x="20" y="60" font-size="10.5" fill="#64748b">English · తెలుగు · हिन्दी · தமிழ்</text>
    <text x="20" y="76" font-size="10.5" fill="#64748b">Client-side language switcher</text>
  </g>
  <!-- Arrow: i18n → Frontend -->
  <line x1="670" y1="176" x2="590" y2="140" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>

  <!-- Footer note -->
  <text x="870" y="608" text-anchor="end" font-size="10" fill="#cbd5e1">Workpin Architecture · Next.js 16 + Supabase</text>
</svg>
