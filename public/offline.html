<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6366f1" />
  <title>Workpin — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8f9ff 0%, #eef0ff 50%, #e8e5ff 100%);
      color: #1a1a2e;
      padding: 24px;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .icon-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: white;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.15);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .pin-icon {
      width: 64px;
      height: 64px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    h1 span {
      color: #6366f1;
    }

    .subtitle {
      font-size: 18px;
      color: #64748b;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .description {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }

    .retry-btn:hover {
      background: #5558e6;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .wave {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to top, rgba(99, 102, 241, 0.05), transparent);
    }

    .dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 24px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c7d2fe;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.3s; }
    .dot:nth-child(3) { animation-delay: 0.6s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #0f0f1a 0%, #141425 50%, #1a1835 100%);
        color: #e2e8f0;
      }
      .icon-wrapper {
        background: #1e1e30;
        box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
      }
      .subtitle { color: #94a3b8; }
      .description { color: #64748b; }
      .wave { background: linear-gradient(to top, rgba(99, 102, 241, 0.08), transparent); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <svg class="pin-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 4C16.268 4 10 10.268 10 18c0 10.5 14 26 14 26s14-15.5 14-26c0-7.732-6.268-14-14-14z" fill="#6366f1"/>
        <circle cx="24" cy="18" r="8" fill="white" opacity="0.95"/>
        <path d="M19 14l2.5 8 2.5-5 2.5 5 2.5-8" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <h1>Work<span>pin</span></h1>
    <p class="subtitle">You're offline</p>
    <p class="description">
      It looks like you've lost your internet connection. 
      Don't worry — your data is safe. Reconnect and pick up right where you left off.
    </p>

    <button class="retry-btn" onclick="window.location.reload()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 11-3.44-7.08"/>
        <polyline points="21 3 21 9 15 9"/>
      </svg>
      Try Again
    </button>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="wave"></div>
</body>
</html>
